<title>Report Assistant — Custom Trade Workflows</title>
<style>
  :root{
    --paper:#F4F7FB; --surface:#FFFFFF; --surface-2:#FBFCFE; --panel:#F7F9FD;
    --ink:#0E1826; --ink-2:#44536B; --ink-3:#7C8AA3;
    --line:#E4EAF3; --line-2:#EDF1F8;
    --brand:#2F6DF6; --brand-deep:#1B4DB3; --brand-wash:#EAF1FE; --bot:#EEF2F8;
    --active:#16A34A; --hold:#E0A100; --bid:#8B5CF6; --done:#64748B; --other:#2F6DF6;
    --warn:#B8791B; --err:#C0392B;
    --shadow:0 1px 2px rgba(14,24,38,.04), 0 12px 32px -12px rgba(14,24,38,.14);
    --sans:ui-sans-serif,system-ui,-apple-system,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    --mono:ui-monospace,"SF Mono","JetBrains Mono",Menlo,Consolas,monospace;
  }
  @media (prefers-color-scheme:dark){:root{
    --paper:#0A101C; --surface:#101B2C; --surface-2:#0D1726; --panel:#0C1524; --ink:#EAF1FB; --ink-2:#9DACC6; --ink-3:#66768F;
    --line:#1E2B41; --line-2:#182338; --brand:#5B8DEF; --brand-deep:#2F6DF6; --brand-wash:#152238; --bot:#16233B;
    --active:#2BBE6C; --hold:#EBB13C; --bid:#A78BFA; --done:#7C8AA3; --other:#5B8DEF; --warn:#EBB13C; --err:#F26B6B;
    --shadow:0 1px 2px rgba(0,0,0,.3), 0 18px 40px -16px rgba(0,0,0,.55);
  }}
  :root[data-theme="light"]{--paper:#F4F7FB;--surface:#FFFFFF;--surface-2:#FBFCFE;--panel:#F7F9FD;--ink:#0E1826;--ink-2:#44536B;--ink-3:#7C8AA3;--line:#E4EAF3;--line-2:#EDF1F8;--brand:#2F6DF6;--brand-deep:#1B4DB3;--brand-wash:#EAF1FE;--bot:#EEF2F8;--active:#16A34A;--hold:#E0A100;--bid:#8B5CF6;--done:#64748B;--other:#2F6DF6;--warn:#B8791B;--err:#C0392B;--shadow:0 1px 2px rgba(14,24,38,.04), 0 12px 32px -12px rgba(14,24,38,.14);}
  :root[data-theme="dark"]{--paper:#0A101C;--surface:#101B2C;--surface-2:#0D1726;--panel:#0C1524;--ink:#EAF1FB;--ink-2:#9DACC6;--ink-3:#66768F;--line:#1E2B41;--line-2:#182338;--brand:#5B8DEF;--brand-deep:#2F6DF6;--brand-wash:#152238;--bot:#16233B;--active:#2BBE6C;--hold:#EBB13C;--bid:#A78BFA;--done:#7C8AA3;--other:#5B8DEF;--warn:#EBB13C;--err:#F26B6B;--shadow:0 1px 2px rgba(0,0,0,.3), 0 18px 40px -16px rgba(0,0,0,.55);}

  *{box-sizing:border-box} html,body{margin:0;height:100%}
  body{background:var(--paper); color:var(--ink); font-family:var(--sans); font-size:15px; -webkit-font-smoothing:antialiased}
  .mono{font-family:var(--mono)} .tnum{font-variant-numeric:tabular-nums}

  .app{display:flex; height:100vh; overflow:hidden}
  /* ---------- chat (left) ---------- */
  .chat{width:388px; flex:none; display:flex; flex-direction:column; background:var(--surface); border-right:1px solid var(--line)}
  .chat__head{display:flex; align-items:center; gap:12px; padding:16px 18px; border-bottom:1px solid var(--line)}
  .chat__avatar{width:38px;height:38px;border-radius:11px;flex:none;display:grid;place-items:center;background:linear-gradient(135deg,var(--brand),#7aa4ff);color:#fff;font-weight:800;font-size:15px}
  .chat__title{font-weight:700; font-size:15px; line-height:1.1}
  .chat__sub{font-size:12px; color:var(--ink-3); margin-top:2px; display:flex; align-items:center; gap:6px}
  .chat__dot{width:7px;height:7px;border-radius:50%;background:var(--active);box-shadow:0 0 0 3px rgba(22,163,74,.15)}
  .chat__theme{margin-left:auto; border:1px solid var(--line); background:var(--surface); color:var(--ink-3); width:32px;height:32px;border-radius:9px;cursor:pointer;display:grid;place-items:center}
  .chat__theme svg{width:15px;height:15px}
  .chat__log{flex:1; overflow-y:auto; padding:18px; display:flex; flex-direction:column; gap:11px; background:var(--panel)}
  .msg{display:flex; max-width:92%}
  .msg--bot{align-self:flex-start} .msg--user{align-self:flex-end}
  .bubble{padding:10px 13px; border-radius:14px; font-size:14px; line-height:1.45; white-space:pre-wrap; word-wrap:break-word}
  .msg--bot .bubble{background:var(--bot); color:var(--ink); border-bottom-left-radius:5px}
  .msg--user .bubble{background:var(--brand); color:#fff; border-bottom-right-radius:5px}
  .bubble .excel{display:inline-flex; align-items:center; gap:7px; margin-top:9px; padding:8px 12px; background:var(--surface); border:1px solid var(--line); border-radius:9px; color:#217346; font-weight:600; font-size:13px; text-decoration:none}
  .bubble .excel:hover{border-color:#217346}
  .tag{display:inline-block; font-size:11px; font-weight:600; text-transform:uppercase; padding:2px 8px; border-radius:999px; margin-bottom:6px}
  .tag--warn{background:#fdf3e2; color:var(--warn)} .tag--err{background:#fbeae8; color:var(--err)}
  .typing{display:flex; gap:4px; padding:12px 14px}
  .typing span{width:7px;height:7px;border-radius:50%;background:#b7c0cf;animation:blink 1.2s infinite ease-in-out}
  .typing span:nth-child(2){animation-delay:.18s} .typing span:nth-child(3){animation-delay:.36s}
  @keyframes blink{0%,80%,100%{opacity:.25;transform:translateY(0)}40%{opacity:1;transform:translateY(-3px)}}
  .chat__composer{display:flex; gap:9px; padding:14px; border-top:1px solid var(--line); background:var(--surface)}
  .chat__input{flex:1; resize:none; border:1px solid var(--line); border-radius:12px; padding:11px 13px; font:inherit; font-size:14px; line-height:1.4; max-height:120px; outline:none; color:var(--ink); background:var(--surface)}
  .chat__input:focus{border-color:var(--brand); box-shadow:0 0 0 3px rgba(47,109,246,.12)}
  .chat__send{flex:none; width:44px;height:44px;border:none;border-radius:12px;background:var(--brand);color:#fff;cursor:pointer;display:grid;place-items:center}
  .chat__send:disabled{opacity:.5;cursor:not-allowed}

  /* ---------- canvas (right) ---------- */
  .canvas{flex:1; overflow-y:auto; padding:26px 28px}
  .empty{height:100%; display:flex; flex-direction:column; align-items:center; justify-content:center; text-align:center; color:var(--ink-3); gap:14px}
  .empty .glyph{width:64px;height:64px;border-radius:16px;background:var(--brand-wash);display:grid;place-items:center;color:var(--brand)}
  .empty h2{margin:0; font-size:17px; color:var(--ink-2); font-weight:700}
  .empty p{margin:0; max-width:42ch; font-size:14px; line-height:1.5}
  .rwrap{max-width:960px; margin:0 auto}

  /* report bits (shared with report.html) */
  .head{background:var(--surface); border:1px solid var(--line); border-radius:14px; box-shadow:var(--shadow); padding:24px 26px; position:relative; overflow:hidden}
  .head::before{content:"";position:absolute;inset:0 auto 0 0;width:4px;background:linear-gradient(180deg,var(--brand),var(--bid))}
  .eyebrow{font-family:var(--mono);font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:var(--ink-3);display:flex;gap:9px;flex-wrap:wrap;align-items:center}
  .eyebrow b{color:var(--brand);font-weight:600}
  .rname{font-size:32px;font-weight:800;letter-spacing:-.02em;margin:9px 0 4px;text-wrap:balance;line-height:1.07}
  .role{color:var(--ink-2);font-size:14px;max-width:72ch}
  .chips{display:flex;gap:8px;flex-wrap:wrap;margin-top:14px}
  .chip{font-family:var(--mono);font-size:12px;padding:5px 10px;border-radius:999px;background:var(--brand-wash);color:var(--brand-deep)}
  .sec{margin-top:22px}
  .sec-h{display:flex;align-items:baseline;gap:12px;margin:0 2px 12px}
  .sec-h h3{font-size:12px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--ink-2);margin:0}
  .sec-h .rule{flex:1;height:1px;background:var(--line)} .sec-h .agg{font-family:var(--mono);font-size:12px;color:var(--ink-3)}
  .kpis{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:13px}
  .kpi{background:var(--surface);border:1px solid var(--line);border-radius:12px;padding:15px;box-shadow:var(--shadow);display:flex;flex-direction:column;gap:5px;min-height:104px}
  .kpi.hero{background:radial-gradient(120% 120% at 100% 0%, var(--brand-wash), transparent 60%), var(--surface);border-color:color-mix(in srgb,var(--brand) 30%, var(--line))}
  .kpi .k-label{font-family:var(--mono);font-size:11px;letter-spacing:.06em;text-transform:uppercase;color:var(--ink-3)}
  .kpi .k-val{font-size:26px;font-weight:800;letter-spacing:-.02em;line-height:1;margin-top:2px}
  .kpi.hero .k-val{color:var(--brand-deep)}
  .cards2{display:grid;grid-template-columns:minmax(0,1fr) minmax(0,1.25fr);gap:13px}
  @media (max-width:1100px){.cards2{grid-template-columns:1fr}}
  .card{background:var(--surface);border:1px solid var(--line);border-radius:12px;box-shadow:var(--shadow);padding:17px}
  .card h4{margin:0 0 12px;font-size:14px;font-weight:700}
  .donut-wrap{display:flex;align-items:center;gap:16px}
  .donut{position:relative;width:140px;height:140px;flex:none} .donut svg{transform:rotate(-90deg)}
  .donut .center{position:absolute;inset:0;display:grid;place-items:center;text-align:center}
  .donut .center .big{font-size:26px;font-weight:800;line-height:1}
  .donut .center .cap{font-family:var(--mono);font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:var(--ink-3);margin-top:3px}
  .donut circle{transition:opacity .18s,stroke-width .18s} .donut.dim circle{opacity:.28} .donut circle.on{opacity:1;stroke-width:22px}
  .legend{display:flex;flex-direction:column;gap:7px;flex:1;min-width:110px}
  .lg{display:flex;align-items:center;gap:9px;font-size:13px;padding:3px 6px;border-radius:8px} .lg:hover{background:var(--surface-2)}
  .lg .dot{width:10px;height:10px;border-radius:3px;flex:none} .lg .lname{color:var(--ink-2)} .lg .lval{margin-left:auto;font-family:var(--mono);font-weight:600}
  .bars{display:flex;flex-direction:column;gap:10px}
  .bar-row{display:grid;grid-template-columns:108px 1fr auto;align-items:center;gap:11px}
  .bar-row .bl{font-size:13px;color:var(--ink-2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .track{height:12px;background:var(--line-2);border-radius:999px;overflow:hidden}
  .fill{height:100%;width:0;border-radius:999px;background:linear-gradient(90deg,var(--brand),var(--brand-deep));transition:width 1s cubic-bezier(.2,.7,.2,1)}
  .bar-row .bv{font-family:var(--mono);font-size:12.5px;font-weight:600;color:var(--ink-2)}
  .tablecard{background:var(--surface);border:1px solid var(--line);border-radius:12px;box-shadow:var(--shadow);overflow:hidden} .tscroll{overflow-x:auto}
  table{width:100%;border-collapse:collapse;font-size:13.5px}
  thead th{font-family:var(--mono);font-size:10.5px;letter-spacing:.06em;text-transform:uppercase;color:var(--ink-3);text-align:left;padding:11px 13px;border-bottom:1px solid var(--line);white-space:nowrap;background:var(--surface-2)}
  thead th.num{text-align:right}
  tbody td{padding:10px 13px;border-bottom:1px solid var(--line-2);vertical-align:middle} tbody tr:last-child td{border-bottom:none}
  tbody tr{transition:background .12s} tbody tr:hover{background:var(--surface-2)}
  td.num{text-align:right;font-family:var(--mono);font-variant-numeric:tabular-nums} td.mono{font-family:var(--mono);color:var(--ink-3)}
  .pill{display:inline-flex;align-items:center;gap:6px;font-size:11.5px;font-weight:600;padding:3px 9px 3px 8px;border-radius:999px;white-space:nowrap}
  .pill::before{content:"";width:7px;height:7px;border-radius:50%;background:currentColor}
  .rfoot{margin-top:20px;display:flex;align-items:center;gap:12px;color:var(--ink-3);font-size:12.5px}
  .rise{opacity:0;transform:translateY(8px);animation:rise .5s cubic-bezier(.2,.7,.2,1) forwards} @keyframes rise{to{opacity:1;transform:none}}
  @media (prefers-reduced-motion:reduce){.rise{animation:none;opacity:1;transform:none}.fill,.donut circle{transition:none!important}}

  @media (max-width:820px){
    .app{flex-direction:column}
    .chat{width:100%; height:46%; border-right:none; border-bottom:1px solid var(--line)}
    .canvas{height:54%; padding:18px}
  }
</style>

<div class="app">
  <div class="chat">
    <div class="chat__head">
      <div class="chat__avatar">R</div>
      <div>
        <div class="chat__title">Report Assistant</div>
        <div class="chat__sub"><span class="chat__dot"></span> Ask &mdash; your report appears on the right</div>
      </div>
      <button class="chat__theme" id="themeBtn" aria-label="Toggle theme"><span id="themeIcon"></span></button>
    </div>
    <div class="chat__log" id="log"></div>
    <div class="chat__composer">
      <textarea class="chat__input" id="input" rows="1" placeholder="e.g. report for Angie Henderson"></textarea>
      <button class="chat__send" id="send" aria-label="Send"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"></line><polygon points="22 2 15 22 11 13 2 9 22 2"></polygon></svg></button>
    </div>
  </div>

  <div class="canvas" id="canvas">
    <div class="empty" id="empty">
      <div class="glyph"><svg width="30" height="30" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7"><path d="M4 19V5a2 2 0 0 1 2-2h9l5 5v11a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2z"/><path d="M14 3v5h5M8 13h8M8 17h5"/></svg></div>
      <h2>Your report will appear here</h2>
      <p>Ask about a person, vendor, client, job, or a status &mdash; the live dashboard renders right here while you keep chatting.</p>
    </div>
    <div class="rwrap" id="report" style="display:none"></div>
  </div>
</div>

<script>
(function(){
  "use strict";
  var CONFIG={
    // Paste your Power Automate HTTP POST URL if this ever changes:
    flowUrl:"https://defaultff6ba2824f544b34b3ee2dfa83ff71.b2.environment.api.powerplatform.com:443/powerautomate/automations/direct/cu/31/workflows/58d6433bbe3a4d3dbcd896627c8b736a/triggers/manual/paths/invoke?api-version=1&sp=%2Ftriggers%2Fmanual%2Frun&sv=1.0&sig=sZ2B7DcdNSfCCfjr0UiekvDmp1B9Mbla3xAktcBMvLA",
    requester:"josh.thomas@customtradeworkflows.com",
    greeting:"Hi! Ask me for a report — e.g. “report for Angie Henderson” — and it’ll render on the right while we keep chatting."
  };
  var $=function(id){return document.getElementById(id);};
  var reduce=matchMedia("(prefers-reduced-motion:reduce)").matches;
  var log=$("log"), input=$("input"), sendBtn=$("send");
  var convId="web-"+Date.now().toString(36)+"-"+Math.floor(Math.random()*1e9).toString(36);
  var turns=[], busy=false, currentCharts=[];

  /* ---------------- chat ---------------- */
  function addMsg(role,text,opts){
    opts=opts||{};
    var wrap=document.createElement("div"); wrap.className="msg msg--"+role;
    var b=document.createElement("div"); b.className="bubble";
    if(opts.tag){ var t=document.createElement("span"); t.className="tag tag--"+opts.tag; t.textContent=opts.tag==="warn"?"Need a bit more":"Something went wrong"; b.appendChild(t); b.appendChild(document.createElement("br")); }
    b.appendChild(document.createTextNode(text||""));
    if(opts.excel){ var a=document.createElement("a"); a.className="excel"; a.href=opts.excel; a.target="_blank"; a.rel="noopener";
      a.innerHTML='<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M8 8l8 8M16 8l-8 8"/></svg> Open in Excel'; b.appendChild(a); }
    wrap.appendChild(b); log.appendChild(wrap); log.scrollTop=log.scrollHeight;
  }
  function typing(on){
    var ex=$("typing"); if(ex) ex.remove();
    if(on){ var w=document.createElement("div"); w.className="msg msg--bot"; w.id="typing"; w.innerHTML='<div class="bubble typing"><span></span><span></span><span></span></div>'; log.appendChild(w); log.scrollTop=log.scrollHeight; }
  }
  function setBusy(v){ busy=v; sendBtn.disabled=v; }

  function send(text){
    text=(text||input.value||"").trim();
    if(!text||busy) return;
    addMsg("user",text); turns.push({role:"user",content:text});
    input.value=""; input.style.height="auto"; setBusy(true); typing(true);
    var transcript=turns.map(function(t){return (t.role==="user"?"User: ":"Assistant: ")+t.content;}).join("\n");
    fetch(CONFIG.flowUrl,{method:"POST",headers:{"Content-Type":"text/plain;charset=UTF-8"},
      body:JSON.stringify({message:transcript,latest:text,transcript:transcript,turns:turns,requester:CONFIG.requester,conversationId:convId,channel:"web"})})
      .then(function(res){ return res.text().then(function(raw){ return {ok:res.ok,status:res.status,raw:raw}; }); })
      .then(function(r){
        typing(false);
        if(!r.ok){ addMsg("bot","The flow responded with HTTP "+r.status+".",{tag:"err"}); return; }
        var data; try{ data=JSON.parse(r.raw); }catch(e){ data={status:"ok",reply:r.raw}; }
        var st=(data.status||"ok").toLowerCase();
        var reply="";
        if(st==="report"||(data.data&&typeof data.data==="object")){
          renderReport(data.data);
          reply="Here’s your report — it’s on the right. Ask a follow-up any time.";
          addMsg("bot",reply,{excel:data.excel});
        } else if(st==="needs_clarification"||st==="clarify"){
          reply=data.clarification||data.reply||"Could you give me a bit more detail?"; addMsg("bot",reply,{tag:"warn"});
        } else if(st==="error"){
          reply=data.reply||data.error||"Sorry, I couldn’t build that."; addMsg("bot",reply,{tag:"err"});
        } else if(data.link){
          reply=data.reply||"Your report is ready."; addMsg("bot",reply+" (open on the right)",{excel:data.excel});
        } else {
          reply=data.reply||"Done."; addMsg("bot",reply,{excel:data.excel});
        }
        turns.push({role:"assistant",content:reply});
      })
      .catch(function(err){ typing(false); addMsg("bot","Couldn’t reach the flow (network/CORS). "+(err&&err.message||""),{tag:"err"}); })
      .then(function(){ setBusy(false); input.focus(); });
  }
  input.addEventListener("keydown",function(e){ if(e.key==="Enter"&&!e.shiftKey){ e.preventDefault(); send(); }});
  input.addEventListener("input",function(){ input.style.height="auto"; input.style.height=Math.min(input.scrollHeight,120)+"px"; });
  sendBtn.addEventListener("click",function(){ send(); });

  /* ---------------- report rendering (envelope-driven) ---------------- */
  var STATUS_VAR={"active":"--active","on hold":"--hold","bid":"--bid","completed":"--done","paid":"--active","overdue":"--err","pending":"--hold"};
  function statusVar(s){return STATUS_VAR[(s||"").toLowerCase()]||"--other";}
  function cssv(n){return getComputedStyle(document.documentElement).getPropertyValue(n).trim();}
  function titleCase(s){return (s||"").charAt(0).toUpperCase()+(s||"").slice(1);}
  function prettify(k){var o=k.replace(/([A-Z])/g," $1"); return (o.charAt(0).toUpperCase()+o.slice(1)).trim();}
  function commas(n){var neg=n<0;var s=Math.abs(Math.round(n)).toString();var o="";while(s.length>3){o=","+s.slice(-3)+o;s=s.slice(0,-3);}return (neg?"-":"")+s+o;}
  function short(n){if(Math.abs(n)>=1e6)return "$"+(n/1e6).toFixed(2)+"M";return "$"+commas(n);}
  function isMoneyKey(k){k=k.toLowerCase();return (k.indexOf("value")>=0||k.indexOf("amount")>=0||k.indexOf("spend")>=0||k.indexOf("cost")>=0||k.indexOf("contract")>=0||k.indexOf("variance")>=0||k.indexOf("budget")>=0||k.indexOf("total")>=0||k.indexOf("paid")>=0||k.indexOf("overdue")>=0||k.indexOf("pending")>=0)&&k.indexOf("count")<0;}
  function isHoursKey(k){return k.toLowerCase().indexOf("hours")>=0;}
  function fmtMetric(k,v){if(typeof v!=="number")return String(v);if(isHoursKey(k))return (Math.round(v*10)/10).toString();if(isMoneyKey(k))return v>=1e6?short(v):("$"+commas(v));return commas(v);}
  function fmtCell(c,v){if(typeof v!=="number")return String(v);var k=c.toLowerCase();if(k.indexOf("hours")>=0)return (Math.round(v*10)/10).toString();if(isMoneyKey(k))return "$"+commas(v);return commas(v);}
  function isNumCol(c){var k=c.toLowerCase();return k.indexOf("value")>=0||k.indexOf("amount")>=0||k.indexOf("cost")>=0||k.indexOf("hours")>=0||k.indexOf("contract")>=0;}
  function esc(s){return String(s).replace(/[&<>]/g,function(c){return {"&":"&amp;","<":"&lt;",">":"&gt;"}[c];});}
  function secBy(env,pred){for(var i=0;i<env.sections.length;i++){if(pred(env.sections[i]))return env.sections[i];}return null;}

  function buildCharts(env){
    var out=[];
    var sb=secBy(env,function(s){return s.aggregates&&s.aggregates.statusBreakdown;});
    if(sb){var m=sb.aggregates.statusBreakdown;var p=Object.keys(m).map(function(k){return [k,m[k]];});out.push({type:"donut",title:"By status",data:p,total:p.reduce(function(a,b){return a+b[1];},0)});}
    var hr=secBy(env,function(s){return s.aggregates&&s.aggregates.hoursByRole;});
    if(hr){var m2=hr.aggregates.hoursByRole;out.push({type:"bars",title:"Hours by role",data:Object.keys(m2).map(function(k){return [k,m2[k]];}).sort(function(a,b){return b[1]-a[1];})});}
    for(var i=0;i<env.sections.length&&out.length<2;i++){var s=env.sections[i];
      if(s.rows&&s.rows.length>1&&s.rows.length<=12&&s.columns&&s.columns.length>=2&&typeof s.rows[0][0]==="string"&&typeof s.rows[0][1]==="number"){
        var pr=s.rows.map(function(r){return [String(r[0]),Number(r[1])];});
        out.push({type:out.length?"bars":"donut",title:s.title,data:pr,total:pr.reduce(function(a,r){return a+r[1];},0)});}}
    return out.slice(0,2);
  }

  function renderReport(env){
    if(!env||!env.summary){ return; }
    $("empty").style.display="none";
    var rep=$("report"); rep.style.display="";
    currentCharts=buildCharts(env);
    var mk=Object.keys(env.summary.metrics||{});
    var chips=mk.slice(0,4).map(function(k){return fmtMetric(k,env.summary.metrics[k])+" "+prettify(k).toLowerCase();});
    var kind=titleCase(env.entityType||"")+" Report";
    var name=env.resolvedEntity||(env.entityType?titleCase(env.entityType):"Report");
    var html='<header class="head rise"><div class="eyebrow"><span>'+esc(kind.toUpperCase())+'</span><span>&middot;</span><b>CUSTOM TRADE WORKFLOWS</b></div>'+
      '<div class="rname">'+esc(name)+'</div><div class="role">'+esc((env.summary.headline)||"")+'</div>'+
      '<div class="chips">'+chips.map(function(c){return '<span class="chip">'+esc(c)+'</span>';}).join("")+'</div></header>';

    if(env.ambiguous){
      html+='<section class="sec rise"><div class="sec-h"><h3>Which one?</h3><span class="rule"></span></div><div class="tablecard"><div class="tscroll"><table><thead><tr><th>Option</th><th>Detail</th></tr></thead><tbody>'+
        (env.candidates||[]).map(function(c){return '<tr><td>'+esc(c.label)+'</td><td class="mono">'+esc(c.hint||"")+'</td></tr>';}).join("")+'</tbody></table></div></div></section>';
      rep.innerHTML=html; $("canvas").scrollTop=0; return;
    }

    if(mk.length){
      var hero=null; for(var i=0;i<mk.length;i++){if(isMoneyKey(mk[i])){hero=mk[i];break;}}
      html+='<section class="sec rise" style="animation-delay:.05s"><div class="sec-h"><h3>At a glance</h3><span class="rule"></span></div><div class="kpis">';
      mk.slice(0,6).forEach(function(k){var v=env.summary.metrics[k];
        html+='<div class="kpi'+(k===hero?' hero':'')+'"><div class="k-label">'+esc(prettify(k))+'</div><div class="k-val tnum" data-target="'+(typeof v==="number"?v:0)+'" data-key="'+esc(k)+'">'+esc(typeof v==="number"?"0":String(v))+'</div></div>';});
      html+='</div></section>';
    }
    if(currentCharts.length){
      html+='<section class="sec rise" style="animation-delay:.1s"><div class="sec-h"><h3>Breakdown</h3><span class="rule"></span></div><div class="cards2">';
      currentCharts.forEach(function(c,idx){
        if(c.type==="donut"){ html+='<div class="card"><h4>'+esc(c.title)+'</h4><div class="donut-wrap"><div class="donut" data-donut="'+idx+'"><svg width="140" height="140" viewBox="0 0 140 140"></svg><div class="center"><div><div class="big tnum" data-big="'+idx+'">'+c.total+'</div><div class="cap">total</div></div></div></div><div class="legend" data-legend="'+idx+'"></div></div></div>'; }
        else { html+='<div class="card"><h4>'+esc(c.title)+'</h4><div class="bars" data-bars="'+idx+'"></div></div>'; }
      });
      if(currentCharts.length===1) html+='<div class="card" style="display:flex;align-items:center;justify-content:center;color:var(--ink-3);font-size:13px">Detail in the table below.</div>';
      html+='</div></section>';
    }
    var tbl=secBy(env,function(s){return s.rows&&s.rows.length&&s.columns&&s.columns.length;});
    if(tbl){
      var agg=tbl.aggregates||{}; var at=(agg.count!=null?agg.count+" rows":"")+(agg.totalContractValue!=null?" · $"+commas(agg.totalContractValue):"");
      html+='<section class="sec rise" style="animation-delay:.15s"><div class="sec-h"><h3>'+esc(tbl.title)+'</h3><span class="rule"></span><span class="agg tnum">'+esc(at)+'</span></div><div class="tablecard"><div class="tscroll"><table><thead><tr>';
      tbl.columns.forEach(function(col){html+='<th class="'+(isNumCol(col)?"num":"")+'">'+esc(col)+'</th>';});
      html+='</tr></thead><tbody>';
      tbl.rows.forEach(function(r){html+='<tr>';
        tbl.columns.forEach(function(col,ci){var v=r[ci];
          if(col.toLowerCase()==="status"){html+='<td><span class="pill" style="color:'+cssv(statusVar(v))+';background:color-mix(in srgb,'+cssv(statusVar(v))+' 15%, transparent)">'+esc(v)+'</span></td>';}
          else if(col.toLowerCase().indexOf("id")>=0&&ci===0){html+='<td class="mono">#'+esc(v)+'</td>';}
          else if(isNumCol(col)){html+='<td class="num">'+esc(fmtCell(col,v))+'</td>';}
          else{html+='<td>'+esc(fmtCell(col,v))+'</td>';}});
        html+='</tr>';});
      html+='</tbody></table></div></div></section>';
    }
    html+='<div class="rfoot rise" style="animation-delay:.2s"><span class="mono">Live report · Custom Trade Workflows</span></div>';
    rep.innerHTML=html; $("canvas").scrollTop=0;
    requestAnimationFrame(function(){ countUp(env); drawCharts(); setTimeout(growBars,140); });
  }

  function countUp(env){
    document.querySelectorAll(".k-val").forEach(function(node){
      var target=parseFloat(node.getAttribute("data-target"))||0, key=node.getAttribute("data-key"), dur=reduce?0:850, t0=null;
      if(dur===0){ node.textContent=fmtMetric(key,target); return; }
      function step(ts){if(!t0)t0=ts;var p=Math.min(1,(ts-t0)/dur);var e=1-Math.pow(1-p,3);node.textContent=fmtMetric(key,target*e);if(p<1)requestAnimationFrame(step);else node.textContent=fmtMetric(key,target);}
      requestAnimationFrame(step);
    });
  }
  function drawCharts(){
    document.querySelectorAll("[data-donut]").forEach(function(node){
      var idx=+node.getAttribute("data-donut"), spec=currentCharts[idx]; if(!spec)return;
      var svg=node.querySelector("svg"), R=56, C=2*Math.PI*R, off=0, legend=document.querySelector('[data-legend="'+idx+'"]'), circs=[];
      spec.data.forEach(function(e,i){
        var len=(spec.total?e[1]/spec.total:0)*C;
        var c=document.createElementNS("http://www.w3.org/2000/svg","circle");
        c.setAttribute("cx",70);c.setAttribute("cy",70);c.setAttribute("r",R);c.setAttribute("fill","none");
        c.setAttribute("stroke",cssv(statusVar(e[0])));c.setAttribute("stroke-width","18");
        c.setAttribute("stroke-dasharray",len+" "+(C-len));c.setAttribute("stroke-dashoffset",-off);
        svg.appendChild(c);circs.push(c);off+=len;
        var lg=document.createElement("div");lg.className="lg";
        lg.innerHTML='<span class="dot" style="background:'+cssv(statusVar(e[0]))+'"></span><span class="lname">'+esc(e[0])+'</span><span class="lval tnum">'+e[1]+'</span>';
        (function(ii,ent){lg.addEventListener("mouseenter",function(){node.classList.add("dim");circs[ii].classList.add("on");node.querySelector('[data-big="'+idx+'"]').textContent=ent[1];node.querySelector(".cap").textContent=ent[0];});
          lg.addEventListener("mouseleave",function(){node.classList.remove("dim");circs.forEach(function(x){x.classList.remove("on");});node.querySelector('[data-big="'+idx+'"]').textContent=spec.total;node.querySelector(".cap").textContent="total";});})(i,e);
        legend.appendChild(lg);
      });
    });
    document.querySelectorAll("[data-bars]").forEach(function(node){
      var idx=+node.getAttribute("data-bars"), spec=currentCharts[idx]; if(!spec)return;
      var mx=spec.data.reduce(function(m,r){return Math.max(m,r[1]);},0)||1;
      spec.data.forEach(function(r){var row=document.createElement("div");row.className="bar-row";
        var val=(r[1]%1?r[1].toFixed(1):r[1]);
        row.innerHTML='<div class="bl" title="'+esc(r[0])+'">'+esc(r[0])+'</div><div class="track"><div class="fill" data-w="'+(r[1]/mx*100)+'"></div></div><div class="bv tnum">'+val+'</div>';
        node.appendChild(row);});
    });
  }
  function growBars(){document.querySelectorAll(".fill").forEach(function(f){f.style.width=f.getAttribute("data-w")+"%";});}

  /* ---------------- theme + boot ---------------- */
  var root=document.documentElement;
  function dark(){var t=root.getAttribute("data-theme");return t?t==="dark":matchMedia("(prefers-color-scheme:dark)").matches;}
  var SUN='<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.9 4.9l1.4 1.4M17.7 17.7l1.4 1.4M2 12h2M20 12h2M4.9 19.1l1.4-1.4M17.7 6.3l1.4-1.4"/></svg>';
  var MOON='<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.8A9 9 0 1 1 11.2 3a7 7 0 0 0 9.8 9.8z"/></svg>';
  function syncTheme(){$("themeIcon").innerHTML=dark()?SUN:MOON;}
  $("themeBtn").addEventListener("click",function(){root.setAttribute("data-theme",dark()?"light":"dark");syncTheme();});
  syncTheme();

  addMsg("bot",CONFIG.greeting);

  // auto-load: ?q=<base64 question> (query-in-link) or #<base64 envelope> (data-in-link)
  try{
    var qs=new URLSearchParams(location.search), q=qs.get("q");
    if(q){ var b=decodeURIComponent(q).replace(/ /g,"+").replace(/[^A-Za-z0-9+/]/g,""); while(b.length%4)b+="="; var question=decodeURIComponent(escape(atob(b))); send(question); }
    else if(location.hash.length>1){ var h=location.hash.slice(1); var b2=decodeURIComponent(h).replace(/ /g,"+").replace(/[^A-Za-z0-9+/]/g,""); while(b2.length%4)b2+="="; renderReport(JSON.parse(decodeURIComponent(escape(atob(b2))))); }
  }catch(e){}
  input.focus();
})();
</script>
